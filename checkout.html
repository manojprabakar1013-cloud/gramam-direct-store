<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Checkout | Gramam Direct</title><link rel="stylesheet" href="assets/css/styles.css"></head><body><div data-header></div><main><section class="page-hero"><div class="container"><h1>Secure checkout</h1><p>Complete your delivery and payment details.</p></div></section><section class="section"><div class="container cart-layout"><form class="form-card" onsubmit="placeOrder(event)"><h2>Delivery details</h2><div class="form-grid"><div class="field full"><label>Full name</label><input name="name" required></div><div class="field"><label>Email</label><input type="email" name="email" required></div><div class="field"><label>Phone</label><input name="phone" required></div><div class="field full"><label>Address</label><textarea name="address" rows="3" required></textarea></div><div class="field"><label>City</label><input name="city" required></div><div class="field"><label>PIN code</label><input name="pin" required></div><div class="field full"><label>Payment method</label><select name="payment"><option>Cash on Delivery</option><option>UPI (demo)</option><option>Card (demo)</option></select></div></div><button class="btn btn-primary" style="width:100%;margin-top:1rem">Place order</button><p style="color:var(--muted);font-size:.85rem">Demo checkout only. Connect Razorpay, Stripe or another payment gateway before accepting live payments.</p></form><aside class="cart-summary"><h3>Your order</h3><div id="checkout-summary"></div></aside></div></section></main><div data-footer></div><script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="assets/js/app.js"></script></body></html>
