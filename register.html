<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Register | Gramam Direct</title><link rel="stylesheet" href="assets/css/styles.css"></head><body><div data-header></div><main class="auth-wrap"><form class="auth-card" onsubmit="handleAuth(event,'register')"><span class="eyebrow">Join the community</span><h1>Create account</h1><p>Save addresses, track orders and shop faster.</p><div class="field"><label>Full name</label><input name="name" required></div><div class="field" style="margin-top:1rem"><label>Email</label><input name="email" type="email" required></div><div class="field" style="margin-top:1rem"><label>Password</label><input name="password" type="password" minlength="6" required></div><button class="btn btn-primary" style="width:100%;margin-top:1.2rem">Create account</button><p style="text-align:center">Already registered? <a href="login.html" style="color:var(--green);font-weight:800">Login</a></p></form></main><div data-footer></div><script src="assets/js/app.js"></script></body></html>
