<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  >

  <meta
    name="description"
    content="Track your Gramam Direct order using your Order ID and phone number."
  >

  <title>Track Order | Gramam Direct</title>

  <link
    rel="stylesheet"
    href="assets/css/styles.css"
  >
</head>

<body>
  <div data-header></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1>Track your order</h1>

        <p>
          Enter your Order ID and the mobile
          number used while placing the order.
        </p>
      </div>
    </section>

    <section class="section">
      <div
        class="container"
        style="max-width:720px"
      >
        <form
          id="track-order-form"
          class="form-card"
        >
          <h2>Order details</h2>

          <div class="form-grid">
            <div class="field full">
              <label for="track-order-id">
                Order ID
              </label>

              <input
                id="track-order-id"
                name="orderId"
                placeholder="Example: GD72018086"
                autocomplete="off"
                required
              >
            </div>

            <div class="field full">
              <label for="track-phone">
                Mobile number
              </label>

              <input
                id="track-phone"
                name="phone"
                type="tel"
                inputmode="numeric"
                pattern="[6-9][0-9]{9}"
                maxlength="10"
                placeholder="10-digit mobile number"
                required
              >
            </div>
          </div>

          <button
            id="track-button"
            class="btn btn-primary"
            type="submit"
            style="width:100%;margin-top:1rem"
          >
            Track order
          </button>
        </form>

        <div
          id="track-result"
          aria-live="polite"
          style="margin-top:1.25rem"
        ></div>
      </div>
    </section>
  </main>

  <div data-footer></div>

  <script src="assets/js/app.js"></script>

  <script>
    const trackingApiUrl =
      "https://script.google.com/macros/s/" +
      "AKfycbyvS5ubSXImh711LFJewNoLLFPR2Lk5aFCQy4q-teDPUxHNQ4pYc32g2vLExsg5N3I-ow" +
      "/exec";

    const trackingForm =
      document.getElementById(
        "track-order-form"
      );

    const trackingResult =
      document.getElementById(
        "track-result"
      );

    const trackingButton =
      document.getElementById(
        "track-button"
      );

    function escapeTrackingHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showTrackingError(message) {
      trackingResult.innerHTML =
        '<div class="trust-card">' +
          '<h3>Order not found</h3>' +
          '<p>' +
            escapeTrackingHtml(message) +
          '</p>' +
          '<a class="btn btn-secondary" href="contact.html">' +
            'Contact support' +
          '</a>' +
        '</div>';
    }

    function showTrackedOrder(order) {
      const products =
        escapeTrackingHtml(
          order.products
        ).replaceAll(
          "\n",
          "<br>"
        );

      trackingResult.innerHTML =
        '<div class="trust-card">' +
          '<div style="display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap">' +
            '<div>' +
              '<span class="eyebrow">Order found</span>' +
              '<h2 style="margin-top:.7rem">' +
                escapeTrackingHtml(
                  order.orderId
                ) +
              '</h2>' +
            '</div>' +
            '<span class="status" style="height:max-content">' +
              escapeTrackingHtml(
                order.status
              ) +
            '</span>' +
          '</div>' +

          '<div style="margin-top:1.25rem;display:grid;gap:.8rem">' +
            '<div>' +
              '<strong>Order date</strong><br>' +
              escapeTrackingHtml(
                order.date
              ) +
            '</div>' +

            '<div>' +
              '<strong>Products</strong><br>' +
              products +
            '</div>' +

            '<div>' +
              '<strong>Payment method</strong><br>' +
              escapeTrackingHtml(
                order.paymentMethod
              ) +
            '</div>' +

            '<div>' +
              '<strong>Total</strong><br>' +
              '<span class="price">₹' +
                Number(
                  order.total || 0
                ).toLocaleString(
                  "en-IN"
                ) +
              '</span>' +
            '</div>' +
          '</div>' +
        '</div>';
    }

    trackingForm.addEventListener(
      "submit",
      function (event) {
        event.preventDefault();

        const formData =
          new FormData(trackingForm);

        const orderId =
          String(
            formData.get("orderId") || ""
          )
            .trim()
            .toUpperCase();

        const phone =
          String(
            formData.get("phone") || ""
          )
            .replace(/\D/g, "")
            .slice(-10);

        trackingButton.disabled = true;
        trackingButton.textContent =
          "Checking order...";

        trackingResult.innerHTML =
          '<div class="trust-card">' +
            '<p>Searching for your order...</p>' +
          '</div>';

        const callbackName =
          "gramamTracking" +
          Date.now();

        const requestScript =
          document.createElement(
            "script"
          );

        const timeoutId =
          setTimeout(
            function () {
              cleanupTrackingRequest();

              showTrackingError(
                "Tracking service is taking too long. Please try again."
              );
            },
            15000
          );

        function cleanupTrackingRequest() {
          clearTimeout(timeoutId);

          delete window[
            callbackName
          ];

          requestScript.remove();

          trackingButton.disabled =
            false;

          trackingButton.textContent =
            "Track order";
        }

        window[callbackName] =
          function (response) {
            cleanupTrackingRequest();

            if (
              !response ||
              !response.success ||
              !response.found
            ) {
              showTrackingError(
                response &&
                response.message
                  ? response.message
                  : "Order not found."
              );

              return;
            }

            showTrackedOrder(
              response.order
            );
          };

        requestScript.onerror =
          function () {
            cleanupTrackingRequest();

            showTrackingError(
              "Unable to connect to the tracking service."
            );
          };

        requestScript.src =
          trackingApiUrl +
          "?action=trackOrder" +
          "&orderId=" +
          encodeURIComponent(orderId) +
          "&phone=" +
          encodeURIComponent(phone) +
          "&callback=" +
          encodeURIComponent(
            callbackName
          );

        document.body.appendChild(
          requestScript
        );
      }
    );
  </script>
</body>
</html>
